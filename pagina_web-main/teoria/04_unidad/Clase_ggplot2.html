#ggplot2

El término gg, viene de “grammar of graphics”.
set de componentes:
- data = debe ser un data.frame
- aesthetics: cómo se representarán visualmente los datos en términos ejes (x,y), color, tamaño, forma, etc.
- geometry: Geometría de los objetos a graficar, Puntos,Líneas,Etc.

&lt;img src="Imagenes/overview_graphic1.png" width="80%"
alt="ggplot1"/&gt;

---
##data

``` r
# Load data
library(ggplot2)
data(ChickWeight)
head(ChickWeight)
```

```
##   weight Time Chick Diet
## 1     42    0     1    1
## 2     51    2     1    1
## 3     59    4     1    1
## 4     64    6     1    1
## 5     76    8     1    1
## 6     93   10     1    1
```

summary(ChickWeight)
```

---
##aesthetics
Esto incluye cosas como qué variable va en el eje X, qué variable va en el eje Y y qué tamaño, forma o color desea para sus puntos/líneas/barras/etc.
ggplot2_image2
!['ggplot 2'](Imagenes/ggplot2_image2.png)
---
##geometry

Una vez que definimos cómo asignar los datos a elementos estéticos de nuestra elección, la forma en que presentamos los datos es  utilizando un objeto geométrico, el cual puede ser un diagrama de dispersión, un diagrama de caja, un diagrama de líneas, etc.
!['ggplot 2'](Imagenes/ggplot2_image3.png)

---
##theme
Te permite decidir cómo se ve el gráfico en términos de como el color, fuente de letra, tamaño de fuente. Si no los especifica, ggplot simplemente usará la configuración predeterminada.
###Ejemplo
Digamos que queremos crear un diagrama de dispersión que muestre el peso versus el tiempo de estos polluelos.


``` r
#ggplot(ChickWeight)
```
---


``` r
#ggplot(data, aes(x, y))
ggplot(ChickWeight, aes(x = Time, y = weight))
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-3-1.png)&lt;!-- --&gt;

---
##bar plot

``` r
# Crea un bar plot con ggplot2
ggplot(ChickWeight, aes(x = Time, y = weight))+
  geom_col()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-4-1.png)&lt;!-- --&gt;

---
##box plot

``` r
# Crea un box plot con ggplot2
ggplot(ChickWeight, aes(x = Diet, y = weight))+
  geom_boxplot()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-5-1.png)&lt;!-- --&gt;
---
## scatter plot

``` r
#ggplot(data, aes(x, y))
ggplot(ChickWeight, aes(x = Time, y = weight))+
  geom_point()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-6-1.png)&lt;!-- --&gt;
---

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet)) +
  geom_point()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-7-1.png)&lt;!-- --&gt;
---
###Modificar el tamaño de los puntos con size

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet)) +
  geom_point(size=5)
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-8-1.png)&lt;!-- --&gt;
---
###Modificar el tamaño en función del peso

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet,size = weight)) +
  geom_point()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-9-1.png)&lt;!-- --&gt;
---
###Figuras en multiples paneles face_grid

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet)) +
  geom_point()+ facet_grid(~Diet)
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-10-1.png)&lt;!-- --&gt;
---
##Cambiar la transparencia con alpha

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet,size=weight)) +
  geom_point(alpha = 0.5)
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-11-1.png)&lt;!-- --&gt;
---
##Cambiar los simblos con respecto a la dieta con shape

``` r
ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet,
size=weight,shape=Diet))+ 
  geom_point()
```

![](Clase_ggplot2_files/figure-html/unnamed-chunk-12-1.png)&lt;!-- --&gt;

##Formas de puntos en R

``` r

![](Clase_ggplot2_files/figure-html/unnamed-chunk-13-1.png)&lt;!-- --&gt;

``` r
fig &lt;-ggplot(ChickWeight, aes(x = Time, y = weight,color = Diet)) +
  geom_point(aes(shape= Diet)) +
scale_shape_manual(values=c(3, 16, 17, 6)) +  scale_color_manual(values=c('#999999','#E69F00', '#56B4E9','pink'))
fig
```

####Títulos con ggtitle

``` r
##scale_[colour|fill]_ghibli_[c|d]()

  geom_point(size = 4)+ # ghibli stuff

xlab("Tiempo(d)")
```

# plotly
Plotly (https://plot.ly/) es un servicio comercial y un producto de código abierto para crear visualizaciones interactivas de alta gama. 
El paquete plotly permite crear gráficos interactivos plotly desde dentro de R. 
Además, cualquier gráfico ggplot2 se puede convertir en un gráfico plotly.


``` r
#install.packages("plotly")
library(plotly)
```

## Barplot

``` r

ggplot(penguins,aes(x = species,fill = species)) + geom_bar() + labs(x = "Species", y = "Frequency",title = "Penguins")

ggplot(penguins, 
       aes(x = species,fill=species, y = after_stat(count/sum(count)))) + 
  geom_bar() +
  labs(x = "Species", 
       y = "Percent", 
       title  = "Penguins") +
  scale_y_continuous(labels = scales::percent)+  coord_flip()
```
